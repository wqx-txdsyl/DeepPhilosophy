<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DeepPhilosophy" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <base href="./" />
    <link rel="icon" href="favicon.png" />
    <title>DeepPhilosophy — 哲学爱好者移动应用</title>
    <meta name="description" content="从公元前三十世纪至二十一世纪，一部横跨五千年的思想史长卷。探索世界哲学流派、哲学家与经典著作。" />
  </head>
  <body>
    <div id="root"></div>
    <!-- 启动时从 config.json 加载 API 地址，写入 localStorage（优先级低于用户手动设置） -->
    <script>
      (function(){
        var stored = localStorage.getItem('dp_api_config');
        if (stored) { try { var c = JSON.parse(stored); if (c.apiUrl) return; } catch(e){} }
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/config.json', true);
        xhr.timeout = 3000;
        xhr.onload = function(){
          if (xhr.status === 200) {
            try {
              var cfg = JSON.parse(xhr.responseText);
              if (cfg.apiUrl && !cfg.apiUrl.includes('YOUR_BACKEND_URL')) {
                var prev = JSON.parse(localStorage.getItem('dp_api_config') || '{}');
                if (!prev.apiUrl) {
                  prev.apiUrl = cfg.apiUrl;
                  localStorage.setItem('dp_api_config', JSON.stringify(prev));
                }
              }
            } catch(e){}
          }
        };
        xhr.send();
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
