    <!-- JSON-LD 结构化数据 -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "DeepPhilosophy",
      "url": "https://deepphilosophy.top",
      "description": "横跨五千年的人类思想史长卷，111个哲学流派、759位哲学家、305部经典著作",
      "author": {"@type": "Person", "name": "@txdsyl_"},
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://deepphilosophy.top/books?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">

  </head>
  <body>
    <div id="root"></div>
    <!-- 启动时从 config.json 加载 API 地址，写入 localStorage（优先级低于用户手动设置） -->
    <script>
      (function(){
        var stored = localStorage.getItem('dp_api_config');
        if (stored) { try { var c = JSON.parse(stored); if (c.apiUrl) return; } catch(e){} }
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/config.json', true);
        xhr.timeout = 3000;
        xhr.onload = function(){
          if (xhr.status === 200) {
            try {
              var cfg = JSON.parse(xhr.responseText);
              if (cfg.apiUrl && !cfg.apiUrl.includes('YOUR_BACKEND_URL')) {
                var prev = JSON.parse(localStorage.getItem('dp_api_config') || '{}');
                if (!prev.apiUrl) {
                  prev.apiUrl = cfg.apiUrl;
                  localStorage.setItem('dp_api_config', JSON.stringify(prev));
                }
              }
            } catch(e){}
          }
        };
        xhr.send();
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
