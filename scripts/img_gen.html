<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agnes Image Generator</title>
<style>
  :root {
    --bone: #F4F0EB; --ink: #2B2B2B; --ochre: #C4956A;
    --bg: #F4F0EB; --card: #EDE7DD; --border: #D4C9BC;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Inter',-apple-system,sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
  .container { max-width: 720px; margin: 0 auto; padding: 40px 20px; }
  h1 { font-family: 'Playfair Display',serif; font-size: 28px; font-weight: 400; font-style: italic; margin-bottom: 4px; }
  .sub { font-size: 12px; color: var(--ochre); margin-bottom: 32px; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 16px 0 6px; color: var(--ink); }
  textarea, input, select { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); font-size: 14px; font-family: inherit; color: var(--ink); outline: none; resize: vertical; }
  textarea:focus, input:focus { border-color: var(--ochre); }
  textarea { min-height: 80px; }
  .row { display: flex; gap: 12px; }
  .row > * { flex: 1; }
  button { margin-top: 20px; padding: 12px 32px; border: 1px solid var(--ink); border-radius: 8px; background: var(--ink); color: var(--bone); font-size: 14px; cursor: pointer; transition: all 0.2s; }
  button:hover { background: var(--ochre); border-color: var(--ochre); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .result { margin-top: 32px; }
  .result img { max-width: 100%; border-radius: 8px; border: 1px solid var(--border); }
  .error { color: #A04040; font-size: 13px; margin-top: 12px; }
  .history { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 48px; padding-top: 32px; border-top: 1px solid var(--border); }
  .history img { width: 120px; height: 120px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; transition: transform 0.15s; }
  .history img:hover { transform: scale(1.05); }
</style>
</head>
<body>
<div class="container">
  <h1>Agnes Image Generator</h1>
  <p class="sub">agnes-image-2.1-flash · $0/张</p>

  <label>API Key</label>
  <input type="password" id="apiKey" placeholder="默认已填入，直接使用即可" value="sk-tAli2tVgjAi5VG2zBG3oz4hUefyaqrD6UyjDaIpvhH6SKEAD">

  <label>Prompt</label>
  <textarea id="prompt" placeholder="描述你想要生成的图像...">minimal line art icon of an open book, ink strokes, ancient manuscript style, monochrome, transparent background, 24x24 icon</textarea>

  <div class="row">
    <div><label>宽度</label><input type="number" id="width" value="1024" min="64" max="2048"></div>
    <div><label>高度</label><input type="number" id="height" value="1024" min="64" max="2048"></div>
  </div>

  <button id="generate" onclick="generate()">✨ 生成</button>

  <div id="error" class="error"></div>
  <div id="result" class="result"></div>
  <div id="history" class="history"></div>
</div>

<script>
const API = 'https://apihub.agnes-ai.com/v1/images/generations';
const history = JSON.parse(localStorage.getItem('img_history') || '[]');

function renderHistory() {
  const el = document.getElementById('history');
  el.innerHTML = history.slice(-20).reverse().map((h,i) =>
    `<img src="${h.url}" title="${h.prompt.slice(0,60)}" onclick="showDetail('${h.url}','${h.prompt.replace(/'/g,"\\'")}')">`
  ).join('');
}
renderHistory();

async function generate() {
  const key = document.getElementById('apiKey').value.trim();
  const prompt = document.getElementById('prompt').value.trim();
  const w = parseInt(document.getElementById('width').value) || 1024;
  const h = parseInt(document.getElementById('height').value) || 1024;
  const btn = document.getElementById('generate');
  const err = document.getElementById('error');
  const res = document.getElementById('result');
  err.textContent = ''; res.innerHTML = '';

  if (!key || !prompt) { err.textContent = '请填写 API Key 和 Prompt'; return; }

  btn.disabled = true; btn.textContent = '生成中...';
  try {
    const r = await fetch(API, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'agnes-image-2.1-flash',
        prompt, size: `${w}x${h}`,
        extra_body: { response_format: 'url' }
      })
    });
    if (!r.ok) { const d = await r.json().catch(()=>({})); throw new Error(d.detail || d.error?.message || `HTTP ${r.status}`); }
    const data = await r.json();
    const url = data.data?.[0]?.url;
    if (!url) throw new Error('No image URL in response');

    res.innerHTML = `<a href="${url}" target="_blank"><img src="${url}" alt="generated"></a>`;
    history.push({ url, prompt, size: `${w}x${h}`, time: Date.now() });
    if (history.length > 100) history.shift();
    localStorage.setItem('img_history', JSON.stringify(history));
    renderHistory();
  } catch(e) {
    err.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = '✨ 生成';
  }
}

function showDetail(url, prompt) {
  document.getElementById('result').innerHTML = `<a href="${url}" target="_blank"><img src="${url}" alt=""></a><p style="margin-top:8px;font-size:12px;color:var(--ochre)">${prompt}</p>`;
  window.scrollTo({ top: document.getElementById('result').offsetTop - 20, behavior: 'smooth' });
}
</script>
</body>
</html>
