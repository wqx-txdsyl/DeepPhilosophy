# Render.com deployment config
services:
  - type: web
    name: deephilosophy-api
    env: docker
    repo: https://github.com/wqx-txdsyl/DeepPhilosophy
    branch: master
    region: singapore
    plan: free
    dockerfilePath: ./backend/Dockerfile
    disk:
      name: user-data
      mountPath: /app/persist
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PORT
        value: 8000
      - key: USE_GITHUB
        value: true
      - key: PERSIST_DIR
        value: /app/persist
