# Render.com deployment config
services:
  - type: web
    name: deephilosophy-api
    env: docker
    repo: https://github.com/txdsyl/deephilosophy-backend
    region: singapore
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PORT
        value: 8000
