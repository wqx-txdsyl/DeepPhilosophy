# Render.com deployment config
services:
  - type: web
    name: deephilosophy-api
    env: docker
    repo: https://github.com/wqx-txdsyl/DeepPhilosophy
    branch: master
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PORT
        value: 8000
      - key: USE_GITHUB
        value: true
