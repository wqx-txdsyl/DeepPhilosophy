name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://deepphilosophy-7g7m.onrender.com/api/health || true
