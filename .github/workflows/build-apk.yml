name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          mkdir -p ${{ runner.temp }}/android-sdk
          cd ${{ runner.temp }}
          curl -sL -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=${{ runner.temp }}/android-sdk" >> $GITHUB_ENV
          echo "${{ runner.temp }}/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          yes | ${{ runner.temp }}/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          ${{ runner.temp }}/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Install npm dependencies
        run: cd app && npm install --no-audit --no-fund

      - name: Build web app
        run: cd app && npx vite build
        env:
          VITE_API_URL: https://deepphilosophy.onrender.com

      - name: Sync Capacitor
        run: cd app && npx cap sync android

      - name: Build APK
        run: cd app/android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ runner.temp }}/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: deephilosophy-apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
