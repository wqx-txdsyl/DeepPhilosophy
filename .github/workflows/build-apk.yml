name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK 36
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - name: Install npm dependencies
        run: cd app && npm install --no-audit --no-fund

      - name: Build web app
        run: cd app && npx vite build
        env:
          VITE_API_URL: https://deepphilosophy.onrender.com

      - name: Sync Capacitor
        run: cd app && npx cap sync android

      - name: Build APK
        run: cd app/android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: deephilosophy-apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
